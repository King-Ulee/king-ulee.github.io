<div class="newsletter-cta not-prose">
  <div class="newsletter-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
  </div>

  <h3 class="newsletter-heading">Enjoyed this? Subscribe for more.</h3>
  <p class="newsletter-text">New posts delivered to your inbox. No spam, unsubscribe anytime.</p>

  <div class="newsletter-field-group">
    <input type="email" id="emailInput" placeholder="your@email.com" required class="newsletter-input" />
    
    <button class="newsletter-button" onclick="subscribe()">Subscribe</button>
  </div>
</div>

<script>
function subscribe() {
  const email = document.getElementById("emailInput").value;

  if (!email) {
    alert("Masukkan email dulu bro");
    return;
  }

  const gmailURL = `https://mail.google.com/mail/?view=cm&fs=1&to=fidzlieazriel@gmail.com&su=Subscribe&body=Email saya: ${email}`;

  window.open(gmailURL, "_blank");
}
</script>
